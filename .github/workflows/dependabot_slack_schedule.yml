name: Dependabot Slack Notification (Scheduled)

on:
  schedule:
    # critical/high: daily at 9:00 JST (0:00 UTC)
    - cron: "0 0 * * *"
    # medium: weekly on Monday at 9:00 JST
    - cron: "0 0 * * 1"
    # low: monthly on 1st at 9:00 JST
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      severity_filter:
        description: "Severity levels to notify (all / critical,high / medium / low)"
        required: false
        default: "all"
      mention:
        description: "Slack mention target (e.g. @channel, <@U12345>)"
        required: false
        default: ""

jobs:
  # ---------- Scheduled runs ----------
  daily-critical-high:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * *'
    uses: ./.github/workflows/dependabot_slack_notification.yml
    with:
      severity_filter: "critical,high"
      mention: "<!channel>"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

  weekly-medium:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1'
    uses: ./.github/workflows/dependabot_slack_notification.yml
    with:
      severity_filter: "medium"
      mention: "<!here>"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

  monthly-low:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'
    uses: ./.github/workflows/dependabot_slack_notification.yml
    with:
      severity_filter: "low"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}

  # ---------- Manual run ----------
  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/dependabot_slack_notification.yml
    with:
      severity_filter: ${{ inputs.severity_filter }}
      mention: ${{ inputs.mention }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
