name: Dependabot Slack Notification (Reusable)

on:
  workflow_call:
    inputs:
      severity_filter:
        description: "Severity levels to notify (comma-separated: critical,high,medium,low / all)"
        required: true
        type: string
      mention:
        description: "Slack mention target (e.g. <!channel>, <!here>, <@U12345>, <!subteam^S12345>)"
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      DEPENDABOT_TOKEN:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yq
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2

      - name: Parse ignore list
        id: ignore
        run: |
          FILE=".github/dependabot_slack_ignore.yml"
          if [ -f "$FILE" ]; then
            {
              echo 'json<<JSON'
              yq -o=json -I=0 '.' "$FILE"
              echo 'JSON'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'json<<JSON'
              echo '{"ignored_alerts":[]}'
              echo 'JSON'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Slack payload
        id: alerts
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          SEVERITY_FILTER: ${{ inputs.severity_filter }}
          MENTION: ${{ inputs.mention }}
          IGNORE_LIST_JSON: ${{ steps.ignore.outputs.json }}
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN }}
          result-encoding: string
          script: |
            const script = require('./.github/scripts/dependabot-slack-notification.js')
            return await script({github, context, core})

      - name: Notify Slack
        if: steps.alerts.outputs.has_alerts == 'true'
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook-type: webhook-trigger
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: ${{ steps.alerts.outputs.result }}
