name: Trivy Scan

on:
  workflow_dispatch:
    inputs:
      severity:
        description: "Severity levels (e.g. CRITICAL,HIGH / CRITICAL,HIGH,MEDIUM,LOW)"
        required: false
        default: "CRITICAL,HIGH"
      mention:
        description: "Slack mention target (e.g. <!channel>, <!here>, <@U12345>)"
        required: false
        default: ""

jobs:
  manual:
    uses: ./.github/workflows/_trivy_scan.yml
    with:
      severity: ${{ inputs.severity }}
      mention: ${{ inputs.mention }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
