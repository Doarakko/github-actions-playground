name: Dependabot Slack Notification (Reusable)

on:
  workflow_call:
    inputs:
      severity_filter:
        description: "Severity levels to notify (comma-separated: critical,high,medium,low / all)"
        required: true
        type: string
      mention:
        description: "Slack mention target (e.g. <!channel>, <!here>, <@U12345>, <!subteam^S12345>)"
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      DEPENDABOT_TOKEN:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Parse ignore list
        id: ignore
        run: |
          FILE=".github/dependabot_slack_ignore.yml"
          if [ -f "$FILE" ]; then
            {
              echo 'json<<JSON'
              yq -o=json -I=0 '.' "$FILE"
              echo 'JSON'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'json<<JSON'
              echo '{"ignored_alerts":[]}'
              echo 'JSON'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Slack payload
        id: alerts
        uses: actions/github-script@v8
        env:
          SEVERITY_FILTER: ${{ inputs.severity_filter }}
          MENTION: ${{ inputs.mention }}
          IGNORE_LIST_JSON: ${{ steps.ignore.outputs.json }}
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN }}
          result-encoding: string
          script: |
            const script = require('./.github/scripts/dependabot-slack-notification.js')
            return await script({github, context, core})

      - name: Notify Slack
        if: steps.alerts.outputs.has_alerts == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook-type: webhook-trigger
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: ${{ steps.alerts.outputs.result }}
