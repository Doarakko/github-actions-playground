name: Trivy Scan (Scheduled)

on:
  schedule:
    # CRITICAL,HIGH: weekdays at 9:00 JST (0:00 UTC)
    - cron: "0 0 * * 1-5"
    # MEDIUM: weekly on Monday at 9:00 JST
    - cron: "0 0 * * 1"
    # LOW: monthly on 1st at 9:00 JST
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      severity:
        description: "Severity levels (e.g. CRITICAL,HIGH / CRITICAL,HIGH,MEDIUM,LOW)"
        required: false
        default: "CRITICAL,HIGH"
      mention:
        description: "Slack mention target (e.g. <!channel>, <!here>, <@U12345>)"
        required: false
        default: ""

jobs:
  # ---------- Scheduled runs ----------
  daily-critical-high:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1-5'
    uses: ./.github/workflows/_trivy_scan.yml
    with:
      severity: "CRITICAL,HIGH"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  weekly-medium:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1'
    uses: ./.github/workflows/_trivy_scan.yml
    with:
      severity: "MEDIUM"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  monthly-low:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'
    uses: ./.github/workflows/_trivy_scan.yml
    with:
      severity: "LOW"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ---------- Manual run ----------
  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_trivy_scan.yml
    with:
      severity: ${{ inputs.severity }}
      mention: ${{ inputs.mention }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
